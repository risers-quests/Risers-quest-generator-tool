<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Risers' Quests — Generator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;400;700;900&family=Source+Serif+4:opsz,wght@8..60,300;400;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ── APP UI ── */
:root{--paper:#EDE6D6;--card:#F8F4EA;--ink:#20242B;--stamp:#A23B33;--brass:#A9824A;--line:#C9BFA8;--soft:#DAD2BC;}
*{box-sizing:border-box;}
body{margin:0;background:var(--paper);color:var(--ink);font-family:'Source Serif 4',serif;line-height:1.5;}
h1,h2,h3{font-family:'Fraunces',serif;}
.app{max-width:1300px;margin:0 auto;padding:28px 20px 80px;}
.masthead{display:flex;align-items:baseline;justify-content:space-between;gap:16px;border-bottom:2px solid var(--ink);padding-bottom:14px;margin-bottom:26px;flex-wrap:wrap;}
.masthead h1{font-size:clamp(24px,3.5vw,36px);margin:0;letter-spacing:-0.01em;}
.masthead .tag{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.1em;text-transform:uppercase;opacity:0.55;}
.layout{display:grid;grid-template-columns:310px 1fr;gap:22px;align-items:start;}
@media(max-width:820px){.layout{grid-template-columns:1fr;}}
.sidebar{background:var(--card);border:1px solid var(--line);padding:18px;position:sticky;top:14px;}
.eyebrow{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--stamp);margin:0 0 3px;}
.sidebar h2{font-size:17px;margin:0 0 14px;}
label{display:block;font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:0.08em;text-transform:uppercase;opacity:0.65;margin:13px 0 5px;}
select{width:100%;padding:8px 10px;font-family:'Source Serif 4',serif;font-size:14px;background:#fff;border:1px solid var(--line);color:var(--ink);}
.world-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.world-btn{border:1px solid var(--line);background:#fff;padding:8px;text-align:left;cursor:pointer;}
.world-btn b{display:block;font-family:'Fraunces',serif;font-size:13px;font-weight:700;margin-bottom:1px;}
.world-btn small{font-family:'IBM Plex Mono',monospace;font-size:9px;opacity:0.55;}
.world-btn[aria-pressed="true"]{border-color:var(--ink);background:var(--paper);box-shadow:inset 0 0 0 1px var(--ink);}
.level-row{display:flex;flex-direction:column;gap:4px;}
.level-btn{display:flex;justify-content:space-between;align-items:center;border:1px solid var(--line);background:#fff;padding:7px 10px;font-family:'IBM Plex Mono',monospace;font-size:11px;cursor:pointer;}
.level-btn .desc{font-size:9px;opacity:0.5;}
.level-btn[aria-pressed="true"]{border-color:var(--brass);background:#FBF3E3;}
.gen-btn{width:100%;margin-top:16px;padding:12px;background:var(--stamp);color:#fff;border:none;font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:0.08em;text-transform:uppercase;font-weight:600;cursor:pointer;}
.gen-btn:disabled{opacity:0.4;cursor:not-allowed;}
.hint{font-family:'IBM Plex Mono',monospace;font-size:10px;opacity:0.5;margin-top:7px;}
.saved-section{margin-top:18px;border-top:1px dashed var(--line);padding-top:12px;}
.saved-section h3{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:0.1em;text-transform:uppercase;margin:0 0 8px;opacity:0.55;}
.saved-item{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--soft);}
.saved-item span{font-size:11px;}
.saved-item button{background:none;border:none;color:var(--stamp);font-family:'IBM Plex Mono',monospace;font-size:10px;text-decoration:underline;cursor:pointer;padding:0;}
.empty{font-family:'IBM Plex Mono',monospace;font-size:10px;opacity:0.45;}
.main{min-height:400px;}
.placeholder{border:1px dashed var(--line);padding:60px 20px;text-align:center;font-family:'IBM Plex Mono',monospace;font-size:11px;opacity:0.4;}
.quest-seal{background:var(--ink);color:var(--paper);padding:10px 16px;display:inline-block;margin-bottom:18px;}
.quest-seal .qid{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.08em;opacity:0.65;}
.quest-seal .qtitle{font-family:'Fraunces',serif;font-size:17px;font-weight:700;margin-top:2px;}
.sec-card{background:var(--card);border:1px solid var(--line);margin-bottom:14px;}
.sec-tab{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:9px 14px;background:var(--ink);color:var(--paper);cursor:pointer;user-select:none;}
.sec-tab h3{margin:0;font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:500;letter-spacing:0.04em;}
.sec-tab-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.sec-status{font-family:'IBM Plex Mono',monospace;font-size:10px;opacity:0.75;}
.dl-btn{background:none;border:1px solid rgba(255,255,255,0.35);color:#fff;font-family:'IBM Plex Mono',monospace;font-size:10px;padding:3px 9px;cursor:pointer;white-space:nowrap;}
.dl-btn:hover{background:rgba(255,255,255,0.12);}
.dl-btn:disabled{opacity:0.4;cursor:default;}
.sec-preview{padding:14px 18px;max-height:240px;overflow-y:auto;font-size:13px;line-height:1.65;white-space:pre-wrap;border-top:1px solid rgba(255,255,255,0.06);}
.sec-preview.closed{display:none;}
.pulse{display:inline-block;width:6px;height:6px;border-radius:50%;background:currentColor;animation:pulse 1s infinite ease-in-out;}
@keyframes pulse{0%,100%{opacity:0.2;}50%{opacity:1;}}
.err{color:var(--stamp);font-family:'IBM Plex Mono',monospace;font-size:11px;}
</style>
</head>
<body>
<div class="app">
  <div class="masthead">
    <h1>Risers' Quests</h1>
    <div class="tag">Quest Generator · Guide Use Only</div>
  </div>
  <div class="layout">
    <div class="sidebar">
      <p class="eyebrow">New Quest</p>
      <h2>Request Form</h2>
      <label>World</label>
      <div class="world-grid" id="worldGrid"></div>
      <label>Level</label>
      <div class="level-row" id="levelRow"></div>
      <label for="skillSel">Core Skill</label>
      <select id="skillSel"></select>
      <label for="langSel">Language Skill (optional)</label>
      <select id="langSel"></select>
      <button class="gen-btn" id="genBtn" disabled>Generate Quest</button>
      <p class="hint" id="hint">Pick a World, a Level, and a Core Skill.</p>
      <div class="saved-section">
        <h3>Archived Quests</h3>
        <div id="savedList"><p class="empty">None yet.</p></div>
      </div>
    </div>
    <div class="main" id="mainArea">
      <div class="placeholder">Select inputs and generate a Quest to begin.</div>
    </div>
  </div>
</div>
<div id="pdfZone" style="position:fixed;left:-99999px;top:0;width:794px;background:#fff;"></div>

<script>
'use strict';

const WORLDS=[
  {key:'Fantasy',letter:'F',desc:"A world that doesn't exist"},
  {key:'Adventure',letter:'A',desc:'A real-world crisis to solve'},
  {key:'Mystery',letter:'M',desc:'The science behind real events'},
  {key:'Drama',letter:'D',desc:'Debate, art, or performance'},
];
const LEVELS=[
  {key:'Wanderer',desc:'most guided'},
  {key:'Seeker',desc:'some open decisions'},
  {key:'Explorer',desc:'self-directed'},
  {key:'Pathfinder',desc:'fully open'},
];
const WORLD_COLORS={
  Fantasy:'#5C4A9E',
  Adventure:'#B85828',
  Mystery:'#1E6460',
  Drama:'#8C2333',
};
const MATH_SKILLS=['Number Sense & Operations','Number Fluency & Fact Mastery','Decimals','Fractions','Fractions, Decimals, Percentages','Integers (Positive & Negative Numbers)','Ratios & Proportions','Powers, Squares, Cubes','Algebra Foundations'];
const SCIENCE_SKILLS=['Characteristics of Living Things','Plant Structure and Function','Basic Food Chains','Pollination and Seed Dispersal','Adaptations in Animals and Plants','States of Matter','Properties of Materials','Physical Changes','Mixtures','Push and Pull Forces','Gravity','Heat and Temperature','Simple Machines','Sound: Pitch and Volume','Light Reflection','Weather Patterns','Water Cycle','Solar System Basics','Rocks and Minerals','Moon Phases','Natural Disasters','Cell Structure and Function','Digestive System','Respiratory System','Photosynthesis','Ecosystems','Chemical and Physical Changes','Elements, Compounds, Mixtures','Solutions','Acids and Bases','Speed and Motion','Friction','Kinetic and Potential Energy','Electric Circuits','Reflection and Refraction','Properties of Waves','Magnets and Electromagnets','Rock Cycle','Atmosphere','Climate Zones','Earthquakes and Volcanoes','Circulatory System','Nervous System','Immune System','DNA and Genes','Inheritance and Traits','Variation in Species','Pollution and Climate Change','Chemical Reactions','pH Scale','Balancing Equations','Neutralization','Exothermic and Endothermic Reactions','Velocity and Acceleration',"Newton's Laws of Motion",'Conservation of Energy','Current, Voltage, Resistance','Electromagnetic Spectrum Basics','Climate Change','Advanced Weather Systems'];
const LANG_SKILLS=['Reading Skills & Strategies','Text Analysis & Evidence','Research & Informational Reading','Digital Literacy & Communication','Writing Process','Grammar, Style & Vocabulary','Performance & Oral Expression','Sentence Structure','Story Structure','Narrative Elements','Discussion & Debate'];

const WORLD_SVGS={
  Mystery:`<svg width="48" height="48" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="20" cy="20" r="13"/><line x1="30" y1="30" x2="44" y2="44" stroke-width="2.5"/><line x1="20" y1="13" x2="20" y2="27" stroke-width="1"/><circle cx="20" cy="31" r="1.8" fill="currentColor" stroke="none"/></svg>`,
  Fantasy:`<svg width="48" height="48" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M30 5 A17 17 0 1 0 30 41 A12 12 0 1 1 30 5Z"/><circle cx="43" cy="9" r="2" fill="currentColor" stroke="none"/><circle cx="46" cy="21" r="1.5" fill="currentColor" stroke="none"/><circle cx="44" cy="3" r="1.5" fill="currentColor" stroke="none"/></svg>`,
  Adventure:`<svg width="48" height="48" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="1.4"><circle cx="24" cy="24" r="19"/><polygon points="24,7 27,22 24,19 21,22" fill="currentColor" stroke="none"/><polygon points="24,41 27,26 24,29 21,26" fill="none" stroke="currentColor" stroke-width="1.2"/><line x1="5" y1="24" x2="43" y2="24" stroke-width="0.8"/><line x1="24" y1="5" x2="24" y2="43" stroke-width="0.8"/></svg>`,
  Drama:`<svg width="54" height="42" viewBox="0 0 54 42" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><ellipse cx="16" cy="19" rx="12" ry="14"/><circle cx="10" cy="15" r="2" fill="currentColor" stroke="none"/><circle cx="22" cy="15" r="2" fill="currentColor" stroke="none"/><path d="M10 25 Q16 33 22 25"/><ellipse cx="38" cy="22" rx="12" ry="14"/><circle cx="32" cy="18" r="2" fill="currentColor" stroke="none"/><circle cx="44" cy="18" r="2" fill="currentColor" stroke="none"/><path d="M32 30 Q38 22 44 30"/></svg>`,
};

const SECTION_ORDER=['hook','preQuestCheck','archives','links','questPack'];
const SECTION_LABELS={hook:'Hook Card',preQuestCheck:'Pre-Quest Check',archives:'Archives',links:'Links',questPack:'Quest Pack'};
const SECTION_TOKENS={hook:500,preQuestCheck:1400,archives:4000,questPack:5500,links:800};

let ST={world:null,level:null,skill:null,subject:null,lang:'',brief:null,sections:{}};
let qCount=parseInt(localStorage.getItem('rq_count')||'0');

const SPEC=`You are the generation engine for "Risers' Quests" — a program where children aged 8-14 complete 3-day hands-on projects (Quests) at school, guided by an adult Guide. Generate Quest documents as JSON only.

LEVELS: Wanderer (explicit step-by-step, child follows alone, vocabulary age 8), Seeker (clear steps with some open decisions, vocabulary age 10, short concrete sentences), Explorer (loose prompts, Riser finds own path), Pathfinder (minimal scaffolding, fully open).

WORLDS: Fantasy (world that doesn't exist; real science separates fact from fiction), Adventure (real-world crisis the Riser can respond to), Mystery (scientific explanation behind real events), Drama (scientific or philosophical thinking applied to debate, art, or performance).

HOOK CARD RULES:
1. The Riser IS the person in the situation. Second person, present tense ("You are...", "You have just..."). Extraordinary, specific premise.
2. Short lines, not paragraphs. Max 12 words per line. 4-6 lines. Final line: imperative, 5 words max.
3. Wanderer/Seeker: every word a 9-year-old reads easily. Concrete and sensory.
4. NEVER use: quest, mission, task, challenge, learn, skill, science, maths.

SIX STAGES (always 3 Days):
Stage 1 Deep Dive (Day 1, Research): read Archives.
Stage 2 Brain Dump (Day 1, Thinking): free processing; formats: Mind Map / List / Sketch / Connect / Write.
Stage 3 Blueprint (Day 2, Planning): Part A = 5 prediction questions; Part B = design recording tool (Table/Tracker/Grid/Tree/Flowchart).
Stage 4 "Experiment Zero" (Science) or "Data Analysis" (Math) (Day 2, Doing): step-by-step work, then compare to Stage 3 prediction.
Stage 5 What If (Day 3, Transfer): un-researchable twist, reasoning not lookup.
Stage 6 Leave a Door Open (Day 3, Reflection): one genuinely new question.
Close: Present Your Case.

ARCHIVES: Riser-facing narrative reading. Part 1: real historical anchor + interesting facts + core knowledge. Part 2: mission setup, hand Riser the problem/data. If requiresLinks=true (Explorer only): stop short of one technique. If false: fully self-contained. End always: "Something in here matters for what comes next. You decide what."

LINKS (Explorer only, when needed): Real stable URLs only: mathsisfun.com, bbc.co.uk/bitesize, khanacademy.org, nasa.gov. Max 2.

PRE-QUEST CHECK: 5 questions, no answer key. Q1=MCQ (core concept). Q2-Q5=short answer escalating. Q5 isomorphic to Quest mechanic. Close with specific gating question guidance.

BRANDING: "Risers' Quests". Quest ID = World-letter + 2-digit number. Label "Level" not "Difficulty". Never print Subject, Format, Track, Academic.`;

function ctx(){return `World: ${ST.world}\nLevel: ${ST.level}\nCore Skill: ${ST.skill}\nSubject: ${ST.subject}\nLanguage Skill: ${ST.lang||'integrate organically'}`;}

async function callAPI(system,user,maxTokens=1500){
  const r=await fetch('/api/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({system,user,maxTokens})});
  const d=await r.json();
  if(!r.ok) throw new Error(d.error||`HTTP ${r.status}`);
  return d.text;
}
function parseJ(raw){return JSON.parse(raw.replace(/```json|```/g,'').trim());}
function ac(){return WORLD_COLORS[ST.world]||'#333';}

const PROMPTS={
  brief:()=>`${ctx()}\nReturn ONLY this JSON:\n{"questId":"${WORLDS.find(w=>w.key===ST.world).letter}-${String(qCount+1).padStart(2,'0')}","missionTitle":"string","stage4Name":"Experiment Zero or Data Analysis","requiresLinks":false,"linkGapDescription":null}\nrequiresLinks=true ONLY if Level is Explorer AND a genuine procedural gap is essential.`,
  hook:(b)=>`${ctx()}\nQuest ID: ${b.questId}\nMission: ${b.missionTitle}\nReturn ONLY: {"hookLines":["line 1","line 2","line 3","line 4","short imperative."]}\nRules: second person present tense, Riser IS in the situation, 4-6 lines max 12 words each, final line 5 words max imperative, Wanderer/Seeker vocab a 9-year-old reads easily, NEVER mention: quest mission task challenge learn skill science maths.`,
  preQuestCheck:(b)=>`${ctx()}\nQuest ID: ${b.questId}\nMission: ${b.missionTitle}\nReturn ONLY: {"questions":[{"number":1,"type":"mcq","text":"...","options":["A","B","C","D"]},{"number":2,"type":"short","text":"..."},{"number":3,"type":"short","text":"..."},{"number":4,"type":"short","text":"..."},{"number":5,"type":"short","text":"..."}],"gatingQs":[3,4],"gatingSuggestion":"If Q3 and Q4 felt shaky — ... If Q3 and Q4 were fine — ... If all five felt comfortable — ..."}\nQ1=MCQ concept, Q2-Q5 escalating short answer, Q5 isomorphic to Quest mechanic without revealing it.`,
  archives:(b)=>`${ctx()}\nQuest ID: ${b.questId}\nMission: ${b.missionTitle}\nRequires gap: ${b.requiresLinks}\nReturn ONLY: {"parts":[{"title":"Part 1: Title","paragraphs":["para1","para2","para3"],"table":null},{"title":"Part 2: Title","paragraphs":["para1","para2"],"table":{"headers":["Col1","Col2","Col3"],"rows":[["a","b","c"]]}}]}\ntable=null if none needed. Narrative not textbook. Real history + interesting facts + core knowledge. Final paragraph: "Something in here matters for what comes next. You decide what." If requiresLinks=false give ALL techniques needed.`,
  questPack:(b)=>`${ctx()}\nQuest ID: ${b.questId}\nMission: ${b.missionTitle}\nStage 4: ${b.stage4Name}\nReturn ONLY: {"mission":"2-3 sentence immersive text","stages":[{"number":1,"name":"Deep Dive","day":"Day 1","role":"Research","content":"instruction","prompt":null,"items":null,"partA":null,"partB":null},{"number":2,"name":"Brain Dump","day":"Day 1","role":"Thinking","content":"instruction","prompt":"quoted prompt","items":null,"partA":null,"partB":null},{"number":3,"name":"Blueprint","day":"Day 2","role":"Planning","content":null,"prompt":null,"items":null,"partA":["Q1?","Q2?","Q3?","Q4?","Q5?"],"partB":"Part B instruction"},{"number":4,"name":"${b.stage4Name}","day":"Day 2","role":"Doing","content":"opening instruction","prompt":null,"items":["step1","step2","step3","step4","compare to prediction"],"partA":null,"partB":null},{"number":5,"name":"What If","day":"Day 3","role":"Transfer","content":"full what if scenario","prompt":null,"items":null,"partA":null,"partB":null},{"number":6,"name":"Leave a Door Open","day":"Day 3","role":"Reflection","content":"instruction","prompt":null,"items":null,"partA":null,"partB":null}],"presentYourCase":"text","materials":null}\nPrescriptiveness must match Level exactly. materials=null unless physically hands-on.`,
  links:(b)=>`${ctx()}\nQuest ID: ${b.questId}\nGap: ${b.linkGapDescription}\nReturn ONLY: {"links":[{"number":1,"covers":"max 10 words","detail":"when to use","url":"https://real.url"}],"guideNote":"instructions"}\nReal URLs only: mathsisfun.com bbc.co.uk/bitesize khanacademy.org nasa.gov. Max 2 links.`,
};

/* ── UI ── */
function renderWorldGrid(){
  const g=document.getElementById('worldGrid');g.innerHTML='';
  WORLDS.forEach(w=>{
    const b=document.createElement('button');b.className='world-btn';b.type='button';
    b.setAttribute('aria-pressed',ST.world===w.key);
    b.innerHTML=`<b>${w.key}</b><small>${w.desc}</small>`;
    b.onclick=()=>{ST.world=w.key;renderWorldGrid();checkReady();};
    g.appendChild(b);
  });
}
function renderLevelRow(){
  const r=document.getElementById('levelRow');r.innerHTML='';
  LEVELS.forEach(l=>{
    const b=document.createElement('button');b.className='level-btn';b.type='button';
    b.setAttribute('aria-pressed',ST.level===l.key);
    b.innerHTML=`<span>${l.key}</span><span class="desc">${l.desc}</span>`;
    b.onclick=()=>{ST.level=l.key;renderLevelRow();checkReady();};
    r.appendChild(b);
  });
}
function renderSkillSelect(){
  const s=document.getElementById('skillSel');
  s.innerHTML='<option value="">— choose a Core Skill —</option>';
  const mg=document.createElement('optgroup');mg.label='Math';
  MATH_SKILLS.forEach(sk=>{const o=document.createElement('option');o.value='math|'+sk;o.textContent=sk;mg.appendChild(o);});
  const sg=document.createElement('optgroup');sg.label='Science';
  SCIENCE_SKILLS.forEach(sk=>{const o=document.createElement('option');o.value='science|'+sk;o.textContent=sk;sg.appendChild(o);});
  s.appendChild(mg);s.appendChild(sg);
  s.onchange=()=>{if(!s.value){ST.skill=null;ST.subject=null;}else{const[sub,nm]=s.value.split('|');ST.subject=sub;ST.skill=nm;}checkReady();};
}
function renderLangSelect(){
  const s=document.getElementById('langSel');
  s.innerHTML='<option value="">— integrate organically (default) —</option>';
  LANG_SKILLS.forEach(sk=>{const o=document.createElement('option');o.value=sk;o.textContent=sk;s.appendChild(o);});
  s.onchange=()=>{ST.lang=s.value;};
}
function checkReady(){
  const ok=ST.world&&ST.level&&ST.skill;
  document.getElementById('genBtn').disabled=!ok;
  document.getElementById('hint').textContent=ok?`Ready: ${ST.world} · ${ST.level} · ${ST.skill}`:'Pick a World, a Level, and a Core Skill.';
}
function renderSavedList(){
  const el=document.getElementById('savedList');
  const keys=Object.keys(localStorage).filter(k=>k.startsWith('rq:'));
  if(!keys.length){el.innerHTML='<p class="empty">None yet.</p>';return;}
  el.innerHTML='';
  keys.sort().reverse().forEach(k=>{
    try{
      const d=JSON.parse(localStorage.getItem(k));
      const row=document.createElement('div');row.className='saved-item';
      const sp=document.createElement('span');sp.innerHTML=`<b>${d.brief.questId}</b> ${d.brief.missionTitle}`;
      const btn=document.createElement('button');btn.textContent='Open';
      btn.onclick=()=>reopenQuest(d);
      row.appendChild(sp);row.appendChild(btn);el.appendChild(row);
    }catch(e){}
  });
}

/* ── GENERATE ── */
async function generate(){
  document.getElementById('genBtn').disabled=true;
  ST.sections={};ST.brief=null;
  const main=document.getElementById('mainArea');
  main.innerHTML='<div class="placeholder"><span class="pulse"></span> Drafting mission brief…</div>';
  let brief;
  try{
    const raw=await callAPI(SPEC+'\n\nRespond ONLY with valid JSON. No preamble, no markdown fences.',PROMPTS.brief(),400);
    brief=parseJ(raw);
    if(ST.level!=='Explorer')brief.requiresLinks=false;
    ST.brief=brief;qCount++;localStorage.setItem('rq_count',qCount);
  }catch(e){
    main.innerHTML=`<p class="err">Brief failed — ${e.message}. <button onclick="generate()">Retry</button></p>`;
    document.getElementById('genBtn').disabled=false;return;
  }
  main.innerHTML='';
  const seal=document.createElement('div');seal.className='quest-seal';
  seal.innerHTML=`<div class="qid">${brief.questId}</div><div class="qtitle">${brief.missionTitle}</div>`;
  main.appendChild(seal);
  const secs=SECTION_ORDER.filter(s=>s!=='links'||brief.requiresLinks);
  secs.forEach(key=>main.appendChild(buildCard(key)));
  await Promise.all(secs.map(key=>genSection(key,brief)));
  localStorage.setItem('rq:'+brief.questId,JSON.stringify({brief,world:ST.world,level:ST.level,skill:ST.skill,lang:ST.lang,sections:ST.sections}));
  renderSavedList();
  document.getElementById('genBtn').disabled=false;
}

function buildCard(key){
  const card=document.createElement('div');card.className='sec-card';card.id='card-'+key;
  const tab=document.createElement('div');tab.className='sec-tab';
  tab.innerHTML=`<h3>${SECTION_LABELS[key]}</h3><div class="sec-tab-right" id="tabr-${key}"><span class="sec-status"><span class="pulse"></span> generating…</span></div>`;
  tab.onclick=()=>document.getElementById('prev-'+key).classList.toggle('closed');
  const prev=document.createElement('div');prev.className='sec-preview closed';prev.id='prev-'+key;
  card.appendChild(tab);card.appendChild(prev);
  return card;
}

function sectionSummary(key,data){
  try{
    if(key==='hook')return data.hookLines.join('\n');
    if(key==='preQuestCheck')return data.questions.map(q=>`${q.number}. ${q.text}`).join('\n\n')+'\n\n'+data.gatingSuggestion;
    if(key==='archives')return data.parts.map(p=>p.title+'\n'+p.paragraphs.join('\n')).join('\n\n');
    if(key==='questPack')return 'MISSION\n'+data.mission+'\n\n'+data.stages.map(s=>`Stage ${s.number} — ${s.name}`).join('\n');
    if(key==='links')return data.links.map(l=>`Link ${l.number}: ${l.covers}\n${l.url}`).join('\n\n');
  }catch(e){}return JSON.stringify(data,null,2);
}

async function genSection(key,brief){
  const sys=SPEC+'\n\nRespond ONLY with valid JSON. No preamble, no markdown fences.';
  try{
    let prompt;
    switch(key){
      case 'hook':prompt=PROMPTS.hook(brief);break;
      case 'preQuestCheck':prompt=PROMPTS.preQuestCheck(brief);break;
      case 'archives':prompt=PROMPTS.archives(brief);break;
      case 'questPack':prompt=PROMPTS.questPack(brief);break;
      case 'links':prompt=PROMPTS.links(brief);break;
    }
    const raw=await callAPI(sys,prompt,SECTION_TOKENS[key]);
    const data=parseJ(raw);
    ST.sections[key]=data;
    document.getElementById('prev-'+key).textContent=sectionSummary(key,data);
    document.getElementById('tabr-'+key).innerHTML=`<button class="dl-btn" id="dlbtn-${key}" onclick="dlPDF('${key}')">↓ PDF</button><span class="sec-status">Ready</span>`;
  }catch(e){
    document.getElementById('tabr-'+key).innerHTML=`<span class="sec-status err">${e.message} <button onclick="retrySec('${key}')" style="background:none;border:none;color:var(--stamp);text-decoration:underline;cursor:pointer;font-size:10px;">retry</button></span>`;
  }
}
async function retrySec(key){
  document.getElementById('tabr-'+key).innerHTML='<span class="sec-status"><span class="pulse"></span> retrying…</span>';
  await genSection(key,ST.brief);
  if(ST.brief)localStorage.setItem('rq:'+ST.brief.questId,JSON.stringify({brief:ST.brief,world:ST.world,level:ST.level,skill:ST.skill,lang:ST.lang,sections:ST.sections}));
}

function rhead(brief,label){
  return `<div class="rhead"><span><span class="ac">${brief.questId}</span> · ${brief.missionTitle.toUpperCase()}</span><span>${label.toUpperCase()}</span></div>`;
}
function rfoot(brief){
  return `<div class="rfoot"><span>Risers' Quests · Guide Use Only</span><span>${brief.questId}</span></div>`;
}

function tplHook(brief,data){
  const svg=WORLD_SVGS[ST.world]||'';
  const lines=(data.hookLines||[]);
  const linesHTML=lines.map((l,i)=>`<p class="hook-line${i===lines.length-1?' cta':''}">${l}</p>`).join('');
  return pdfStyles(ac())+`<div class="pdf hook">
    <div class="hook-deco">${svg}</div>
    <div class="hook-world-row">
      <div class="hook-letter">${(ST.world||'')[0]}</div>
      <div class="hook-world-stack">
        <span class="hook-world-name">${(ST.world||'').toUpperCase().split('').join(' ')}</span>
        <span class="hook-world-sub">${WORLDS.find(w=>w.key===ST.world)?.desc||''}</span>
      </div>
    </div>
    <hr class="hook-rule"/>
    <div class="hook-mission-lbl">MISSION</div>
    <h1 class="hook-title">${brief.missionTitle}</h1>
    <div>${linesHTML}</div>
    <div class="hook-bottom">
      <div><span class="hook-lbl">CORE SKILL</span><span class="hook-val">${ST.skill}</span></div>
      <div><span class="hook-lbl">LEVEL</span><span class="hook-val">${ST.level}</span></div>
      <div class="hook-qid">${brief.questId}</div>
    </div>
  </div>`;
}

function tplPQC(brief,data){
  const qs=(data.questions||[]).map(q=>{
    if(q.type==='mcq'){
      const opts=(q.options||[]).map(o=>`<div class="mcq-opt"><span class="mcq-box"></span><span>${o}</span></div>`).join('');
      return `<div class="pq"><div class="pq-row"><span class="pq-num">${q.number}</span><span class="pq-text">${q.text}</span></div><div class="mcq-opts">${opts}</div></div>`;
    }
    return `<div class="pq"><div class="pq-row"><span class="pq-num">${q.number}</span><span class="pq-text">${q.text}</span></div><div class="work"><div class="work-lbl">Working</div><div class="wline"></div><div class="wline"></div><div class="ans-row"><span class="ans-lbl">My answer:</span><div class="ans-line"></div></div></div></div>`;
  }).join('');
  return pdfStyles(ac())+`<div class="pdf" style="min-height:267mm;display:flex;flex-direction:column;">
    ${rhead(brief,'Pre-Quest Check')}
    <h2 class="pqc-title">Before You Begin</h2>
    <hr class="pqc-rule"/>
    <p class="pqc-sub">${ST.world} · ${brief.missionTitle} · ${ST.level}</p>
    <p class="pqc-intro">Five quick questions. No right or wrong way to feel about them — they're just here to help you figure out if now is the right moment for this quest.</p>
    ${qs}
    <div class="gating">${data.gatingSuggestion||''}</div>
    <div style="margin-top:auto;">${rfoot(brief)}</div>
  </div>`;
}

function tplArchives(brief,data){
  const parts=(data.parts||[]).map(part=>{
    const paras=(part.paragraphs||[]).map(p=>`<p>${p}</p>`).join('');
    let tbl='';
    if(part.table){
      const ths=(part.table.headers||[]).map(h=>`<th>${h}</th>`).join('');
      const trs=(part.table.rows||[]).map(r=>`<tr>${(r||[]).map(c=>`<td>${c}</td>`).join('')}</tr>`).join('');
      tbl=`<table class="data-tbl"><thead><tr>${ths}</tr></thead><tbody>${trs}</tbody></table>`;
    }
    return `<div><h3 class="part-title">${part.title}</h3>${paras}${tbl}</div>`;
  }).join('');
  return pdfStyles(ac())+`<div class="pdf arch">
    ${rhead(brief,'The Archives')}
    <h2 class="arch-title">The Archives</h2>
    <hr class="arch-rule"/>
    <p class="arch-mission">Mission: ${brief.missionTitle}</p>
    ${parts}
    ${rfoot(brief)}
  </div>`;
}

function tplQuestPack(brief,data){
  const stages=(data.stages||[]).map(s=>{
    let body='';
    if(s.prompt)body+=`<div class="stage-prompt">${s.prompt}</div>`;
    if(s.content)body+=`<p class="stage-content">${s.content}</p>`;
    if(s.items)body+=`<ul class="stage-items">${(s.items||[]).map(i=>`<li>${i}</li>`).join('')}</ul>`;
    if(s.partA){
      const cells=(s.partA||[]).map((q,i)=>`<div class="bp-cell${i===4?' full':''}"><p class="bp-q">${q}</p><div class="bp-space"></div></div>`).join('');
      body+=`<div><div class="bp-a-lbl">PART A · YOUR PREDICTION — Before you investigate, commit to what you think.</div><div class="bp-grid">${cells}</div></div>`;
    }
    if(s.partB){
      body+=`<div class="bp-b"><div class="bp-b-lbl">PART B · YOUR RECORDING TOOL — Design it before ${brief.stage4Name} begins.</div><p class="stage-content">${s.partB}</p><div class="rec-opts"><span>Table</span><span>Tracker</span><span>Grid</span><span>Tree</span><span>Flowchart</span></div></div>`;
    }
    return `<div class="stage"><div class="stage-hdr"><div class="stage-l"><span class="stage-num">Stage ${s.number}</span><span class="stage-name">${s.name}</span></div><div class="stage-r">${s.day} · ${s.role}</div></div>${body}</div>`;
  }).join('');
  const mats=data.materials?`<div class="mats"><div class="mats-lbl">Materials</div><ul class="mats-list">${data.materials.map(m=>`<li>${m}</li>`).join('')}</ul></div>`:'';
  return pdfStyles(ac())+`<div class="pdf">
    ${rhead(brief,'Quest Pack')}
    <div class="pack-meta"><b>Core Skill:</b> ${ST.skill}&nbsp;&nbsp;&nbsp;<b>Structure:</b> 3 Days · 6 Stages</div>
    <div class="mission-lbl">THE MISSION</div>
    <p class="mission-text">${data.mission||''}</p>
    ${stages}
    ${mats}
    <div class="present"><div class="present-lbl">Present Your Case</div>${data.presentYourCase||''}</div>
    ${rfoot(brief)}
  </div>`;
}

function tplLinks(brief,data){
  const links=(data.links||[]).map(l=>`<div class="link-item"><div class="link-num">Link ${String(l.number).padStart(2,'0')}</div><div class="link-covers">${l.covers}</div><p class="link-detail">${l.detail}</p><div class="link-url">${l.url}</div></div>`).join('');
  return pdfStyles(ac())+`<div class="pdf">
    ${rhead(brief,'Research Links')}
    <h2 class="links-title">Research Links</h2>
    <hr class="links-rule"/>
    <p class="links-sub">${brief.questId} · ${brief.missionTitle} · For Guide Use — Send to Riser Before Day 1</p>
    ${links}
    <div class="guide-note"><div class="guide-note-lbl">Guide Note</div>${data.guideNote||''}</div>
    ${rfoot(brief)}
  </div>`;
}

const TPLS={hook:tplHook,preQuestCheck:tplPQC,archives:tplArchives,questPack:tplQuestPack,links:tplLinks};

/* ── PDF DOWNLOAD ── */
async function dlPDF(key){
  const btn=document.getElementById('dlbtn-'+key);
  if(btn){btn.textContent='⏳ building…';btn.disabled=true;}
  try{
    const data=ST.sections[key];const brief=ST.brief;
    if(!data||!brief)throw new Error('No data');
    const html=TPLS[key](brief,data);
    const zone=document.getElementById('pdfZone');
    zone.innerHTML=html;
    await document.fonts.ready;
    await new Promise(r=>setTimeout(r,500));
    const fname=`${brief.questId}_${SECTION_LABELS[key].replace(/\s/g,'_')}.pdf`;
    await html2pdf().set({
      margin:0,filename:fname,
      image:{type:'jpeg',quality:0.98},
      html2canvas:{scale:2,useCORS:true,letterRendering:true,logging:false},
      jsPDF:{unit:'mm',format:'a4',orientation:'portrait'},
      pagebreak:{mode:['avoid-all','css'],avoid:'.stage,.pq,.link-item'}
    }).from(zone.firstElementChild).save();
    zone.innerHTML='';
  }catch(e){alert('PDF failed: '+e.message);}
  if(btn){btn.textContent='↓ PDF';btn.disabled=false;}
}

/* ── REOPEN ── */
function reopenQuest(saved){
  ST={world:saved.world,level:saved.level,skill:saved.skill,subject:null,lang:saved.lang||'',brief:saved.brief,sections:saved.sections};
  const main=document.getElementById('mainArea');main.innerHTML='';
  const seal=document.createElement('div');seal.className='quest-seal';
  seal.innerHTML=`<div class="qid">${saved.brief.questId}</div><div class="qtitle">${saved.brief.missionTitle}</div>`;
  main.appendChild(seal);
  Object.keys(saved.sections).forEach(key=>{
    const card=buildCard(key);main.appendChild(card);
    document.getElementById('prev-'+key).textContent=sectionSummary(key,saved.sections[key]);
    document.getElementById('tabr-'+key).innerHTML=`<button class="dl-btn" id="dlbtn-${key}" onclick="dlPDF('${key}')">↓ PDF</button><span class="sec-status">Ready</span>`;
  });
}

document.getElementById('genBtn').onclick=generate;
renderWorldGrid();renderLevelRow();renderSkillSelect();renderLangSelect();renderSavedList();
